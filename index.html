<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Cayden ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(to bottom,#000,#2b0000);
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
font-size:3em;
margin-top:60px;
color:#ff2d55;
text-shadow:0 0 15px red;
}

p{
font-size:20px;
width:85%;
margin:auto;
line-height:1.8;
}

button{
margin-top:30px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff2d55;
color:white;
cursor:pointer;
box-shadow:0 0 20px red;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

#letter{
display:none;
margin-top:40px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-110vh);}
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Cayden ❤️ 🎉</h1>

<p>
Today is all about you.
Even though we're miles apart,
I wanted to make you something special.
So...welcome to your little birthday surprise.
</p>

<button onclick="openLetter()">
❤️ Open Your Birthday Surprise ❤️
</button>
<button onclick="playMusic()">
🎧 A little surprise for you ❤️
</button>

<audio id="song" src="untouchable.mp3"></audio>
<div id="letter">

<h2>💌 Dear Cayden,</h2>

<p>
<p id="message"></p>
</p>

<h2>🎂 I Love You 🎂</h2>

</div>

<script>

function openLetter(){
document.getElementById("letter").style.display="block";
typeWriter();
  }

function confetti(){
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},500);
}
let text = `Happy Birthday!! 🥳❤️

I wish I could be there to celebrate with you today,
but until then, this little website will have to do.

Thank you for making me smile,
for making me laugh,
and for putting up with me even when I'm being dramatic 😂.

You're honestly one of the best things that's happened to me,
and I'm so lucky to have you.

I hope this year brings you happiness,
success,
good health,
and everything you've been wishing for.

Just remember...

You're getting older...🤣
but don't worry,
you're still cute.

Distance may keep us apart,
but it could never stop me from caring about you.

I can't wait for the day we celebrate your birthday together instead of through a screen.

Happy Birthday again, my love. ❤️

Love always,

❤️ Mcquita ❤️`;

let i = 0;

function typeWriter(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter, 50);
}
} 
function playMusic(){
document.getElementById("song").play();
}  
setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤️";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(4+Math.random()*5)+"s";
heart.style.fontSize=(15+Math.random()*30)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

},500);  
</script>

</body>
  </html>
